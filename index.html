  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --ink: #111827;
      --muted: #667085;
      --card: rgba(255,255,255,.92);
      --line: rgba(17,24,39,.12);
      --shadow: 0 14px 40px rgba(0,0,0,.24);
      --green: #0f5f46;
      --green-2: #15a36a;
      --wc: #1f2937;
      --accent: #c78b2a;
      --accent-dark: #8a5a00;
      --clubhouse: #7c2d12;
      --clubhouse-light: #c2410c;
      --practice: #1d4ed8;
      --practice-light: #60a5fa;
      --starter: #6d28d9;
      --starter-light: #a78bfa;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #f6f4ef;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }


    /* Leaflet structural fallback: evita teselas desordenadas si el CSS externo tarda o falla */
    .leaflet-container { overflow: hidden; position: relative; }
    .leaflet-pane, .leaflet-tile, .leaflet-marker-icon, .leaflet-marker-shadow, .leaflet-tile-container,
    .leaflet-pane > svg, .leaflet-pane > canvas, .leaflet-zoom-box, .leaflet-image-layer,
    .leaflet-layer { position: absolute; left: 0; top: 0; }
    .leaflet-tile { user-select: none; -webkit-user-drag: none; }
    .leaflet-marker-icon, .leaflet-marker-shadow { display: block; }
    .leaflet-control { position: relative; z-index: 800; pointer-events: auto; }
    .leaflet-top, .leaflet-bottom { position: absolute; z-index: 1000; pointer-events: none; }
    .leaflet-top { top: 0; } .leaflet-right { right: 0; } .leaflet-bottom { bottom: 0; } .leaflet-left { left: 0; }

  #map {
  width: 100%;
  height: 650px;
  min-height: 0;
  max-height: calc(100dvh - 170px);
  background: #d7d3c8;
}

    .top-card {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      z-index: 1000;
      background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,255,255,.84));
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 10px 32px rgba(0,0,0,.20);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      padding: 9px 12px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--green);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-weight: 900;
      margin-bottom: 3px;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(15,95,70,.18);
    }

    .top-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -.035em;
    }

    .top-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .panel {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 12px;;
      z-index: 1000;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
      max-height: 150px;
    }

    .panel-inner {
      padding: 9px 12px 10px;
      display: grid;
      gap: 6px;
    }

    .panel-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .nearest-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: .10em;
      color: var(--muted);
      font-weight: 900;
    }

    .nearest-title {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.1;
      margin-top: 2px;
    }

    .nearest-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(15,95,70,.10);
      color: var(--green);
      font-weight: 900;
      font-size: 12px;
      border: 1px solid rgba(15,95,70,.16);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 900;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: -.01em;
    }

    button:disabled { opacity: .45; cursor: not-allowed; }
    .primary { background: var(--ink); color: white; }
    .secondary { background: rgba(17,24,39,.08); color: var(--ink); }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 10.5px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 6px;
    }

    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .dot.tee { background: var(--green); }
    .dot.wc { background: var(--wc); }
    .dot.featured { background: var(--accent-dark); }
    .dot.clubhouse { background: var(--clubhouse); }
    .dot.practice { background: var(--practice); }
    .dot.starter { background: var(--starter); }

    .pin {
      width: 31px;
      height: 31px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: -.04em;
      border: 2px solid rgba(255,255,255,.96);
      box-shadow: 0 5px 16px rgba(0,0,0,.32);
      transform: translateZ(0);
    }

    .pin.tee {
      background: radial-gradient(circle at 35% 28%, #2ed38e, var(--green) 66%);
    }

    .pin.wc {
      background: radial-gradient(circle at 35% 28%, #475467, #111827 70%);
      font-size: 9px;
    }

    .pin.loop-start {
      width: 38px;
      height: 38px;
      font-size: 10px;
      background: radial-gradient(circle at 35% 28%, #d7a84f, var(--accent-dark) 72%);
      color: #fff;
      border: 3px solid white;
    }

    .pin.clubhouse {
      width: 36px;
      height: 36px;
      font-size: 10px;
      background: radial-gradient(circle at 35% 28%, var(--clubhouse-light), var(--clubhouse) 72%);
      color: #fff;
      border: 3px solid white;
    }

    .pin.practice {
      width: 36px;
      height: 36px;
      font-size: 10px;
      background: radial-gradient(circle at 35% 28%, var(--practice-light), var(--practice) 72%);
      color: #fff;
      border: 3px solid white;
    }

    .pin.starter {
      width: 36px;
      height: 36px;
      font-size: 9px;
      background: radial-gradient(circle at 35% 28%, var(--starter-light), var(--starter) 72%);
      color: #fff;
      border: 3px solid white;
    }

    .leaflet-control-zoom {
      margin-top: 78px !important;
      border: 0 !important;
      box-shadow: 0 6px 18px rgba(0,0,0,.22) !important;
    }
    .leaflet-control-zoom a {
      background: rgba(255,255,255,.93) !important;
      color: var(--ink) !important;
      border: 0 !important;
      font-weight: 900;
    }

    .leaflet-control-attribution {
      font-size: 9px;
      background: rgba(255,255,255,.64) !important;
    }

    @media (max-height: 720px), (max-width: 430px) {
      .top-card { padding: 8px 11px; border-radius: 17px; }
      .eyebrow { font-size: 9px; margin-bottom: 1px; }
      .top-title { font-size: 18px; }
      .top-subtitle { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .panel { bottom: calc(36px + env(safe-area-inset-bottom)); left: 10px; right: 10px; }
      .panel-inner { padding: 8px 11px 9px; gap: 5px; }
      .nearest-title { font-size: 16px; }
      .nearest-desc { display: none; }
      .badge { height: 28px; min-width: 42px; font-size: 11px; }
      .actions { grid-template-columns: 1fr 1fr; gap: 6px; }
      button { padding: 7px 9px; font-size: 11.5px; border-radius: 11px; }
      .legend { display: none; }
      .leaflet-control-zoom { margin-top: 74px !important; }
    }

    @media (max-height: 590px) {
      .top-card { display: none; }
      .leaflet-control-zoom { margin-top: 10px !important; }
    }

function normalizeLang(raw) {
  const value = String(raw || '').trim().toLowerCase();
  if (!value) return 'es';
  if (value.startsWith('en') || value.includes('english') || value.includes('inglés') || value.includes('ingles')) return 'en';
  if (value.startsWith('fr') || value.includes('français') || value.includes('frances') || value.includes('francés')) return 'fr';
  if (value.startsWith('de') || value.includes('german') || value.includes('alemán') || value.includes('aleman')) return 'de';
  if (value.startsWith('eu') || value.includes('euskera') || value.includes('basque')) return 'eu';
  if (value.startsWith('es') || value.includes('spanish') || value.includes('español') || value.includes('espanol')) return 'es';
  return 'es';
}

  setText('nearestTitle', T.initialTitle);
  setText('nearestDesc', T.initialDesc);
  setText('navBtn', T.nav);
  setText('fitBtn', T.fit);
  setText('legendHoles', T.holes);
  setText('legendServices', T.services);
  setText('legendFeatured', T.featured);
  setText('legendClubhouse', T.clubhouse);
  setText('legendPractice', T.practice);
  setText('legendStarter', T.starter);
}

const map = L.map('map', { zoomControl: false, attributionControl: true });
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 20,
  attribution: 'Tiles © Esri'
}).addTo(map);

L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 20,
  attribution: ''
}).addTo(map);

let selectedPoint = null;
const markers = [];

function markerClass(point) {
  if (point.type === 'WC') return 'wc';
  if (point.type === 'CLUBHOUSE') return 'clubhouse';
  if (point.type === 'PRACTICE') return 'practice';
  if (point.type === 'STARTER') return 'starter';
  if (point.hole === 1 || point.hole === 10) return 'loop-start';
  return 'tee';
}

function markerLabel(point) {
  return point.label;
}

function iconSize(point) {
  if (point.hole === 1 || point.hole === 10) return [38,38];
  if (point.type === 'CLUBHOUSE' || point.type === 'PRACTICE' || point.type === 'STARTER') return [36,36];
  return [31,31];
}

function divIcon(point) {
  const size = iconSize(point);
  return L.divIcon({
    className: '',
    html: `<div class="pin ${markerClass(point)}">${markerLabel(point)}</div>`,
    iconSize: size,
    iconAnchor: [size[0]/2, size[1]/2]
  });
}

function navUrl(lat, lng) {
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
}

function pointTitle(point) {
  if (point.type === 'WC') return T.wcTitle;
  if (point.type === 'CLUBHOUSE') return T.clubhouseTitle;
  if (point.type === 'PRACTICE') return T.practiceTitle;
  if (point.type === 'STARTER') return T.starterTitle;
  return T.holeTitle(point.hole);
}

function pointDescription(point) {
  if (point.type === 'WC') return T.wcDesc;
  if (point.type === 'CLUBHOUSE') return T.clubhouseDesc;
  if (point.type === 'PRACTICE') return T.practiceDesc;
  if (point.type === 'STARTER') return T.starterDesc;
  if (point.hole === 1) return T.firstLoopDesc;
  if (point.hole === 10) return T.secondLoopDesc;
  return T.holeDesc(point.hole);
}

function setPanel(point) {
  selectedPoint = point;
  document.getElementById('navBtn').disabled = false;
  document.getElementById('panelLabel').textContent = point.type === 'WC' ? T.serviceLabel : (point.type === 'CLUBHOUSE' || point.type === 'PRACTICE' || point.type === 'STARTER' ? T.facilityLabel : T.referenceLabel);
  document.getElementById('nearestTitle').textContent = pointTitle(point);
  document.getElementById('nearestDesc').textContent = pointDescription(point);
  document.getElementById('panelBadge').textContent = point.type === 'WC' ? 'WC' : (point.type === 'CLUBHOUSE' ? 'CC' : (point.type === 'PRACTICE' ? 'CP' : (point.type === 'STARTER' ? 'SP' : `H${point.hole}`)));
}

POINTS.forEach(point => {
  const m = L.marker([point.lat, point.lng], { icon: divIcon(point), keyboard: false }).addTo(map);
  m.on('click', () => {
    setPanel(point);
    map.panTo([point.lat, point.lng], { animate: true });
  });
  markers.push(m);
});

const group = L.featureGroup(markers);
function fitCourse() {
  map.fitBounds(group.getBounds().pad(0.20));
}

applyLanguage();
fitCourse();

document.getElementById('navBtn').addEventListener('click', () => {
  if (!selectedPoint) return;
  window.open(navUrl(selectedPoint.lat, selectedPoint.lng), '_blank', 'noopener');
});

document.getElementById('fitBtn').addEventListener('click', fitCourse);
</script>
</body>
